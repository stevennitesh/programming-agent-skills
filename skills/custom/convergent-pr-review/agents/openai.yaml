policy:
  allow_implicit_invocation: true

interface:
  display_name: "Convergent PR Review"
  short_description: "Root-owned high-risk release review"
  default_prompt: "Use $convergent-pr-review from the root to pin one immutable high-risk diff, cover every required lens with fresh reviewers or an explicit degraded fallback, and return one verified read-only release decision."
